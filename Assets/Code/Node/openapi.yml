openapi: 3.0.3
servers:
  - description: SwaggerHub API Auto Mocking
    url: 'htttp://localhost:4141/statistics'
info:
  description: This is a simple game statistics API
  version: 1.0.0
  title: Simple Game Statistics API
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
  - name: admins
    description: Secured Admin-only calls
  - name: developers
    description: Operations available to regular developers
paths:
  /session:
    get:
      tags:
        - developers
      summary: retrieves session data
      operationId: getSessions
      description: |
        This operation returns all currently recorded sessions.
      parameters:
        - in: query
          name: cache
          description: the timestamp of when session data was last cached
          required: false
          schema:
            type: string
            format: date-time
            example: '2016-08-29T09:12:33.001Z'
      responses:
        '200':
          description: search results matching criteria
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionRowData'
        '400':
          description: bad input parameter
    post:
      tags:
        - developers
      summary: adds a session entry
      operationId: addSession
      description: Adds a new session to the system
      responses:
        '201':
          description: session entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                started_at:
                  type: string
                  format: date-time
                  example: '2016-08-29T09:12:33.001Z'
                ended_at:
                  type: string
                  format: date-time
                  example: '2016-08-29T09:12:33.001Z'
        description: session data to add
  '/session/{sessionId}':
    get:
      tags:
        - developers
      summary: retrieves specific session data
      operationId: getSession
      description: |
        This operation returns a specific session by its id. 
      parameters:
        - name: sessionId
          in: path
          description: ID of session to return
          required: true
          schema:
            type: integer
            format: uint32
        - in: query
          name: cache
          description: the timestamp of when session data was last cached
          required: false
          schema:
            type: string
            format: date-time
            example: '2016-08-29T09:12:33.001Z'
      responses:
        '200':
          description: search results matching criteria
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionRowData'
        '400':
          description: bad input parameter
    put:
      tags:
        - developers
      summary: updates a session entry
      operationId: updateSession
      description: Updates an existing session in the system
      parameters:
        - name: sessionId
          in: path
          description: ID of session to update
          required: true
          schema:
            type: integer
            format: uint32
      responses:
        '201':
          description: session entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
    delete:
      tags:
        - admins
      summary: deletes a session entry
      operationId: deleteSession
      description: Deletes an existing session in the system
      parameters:
        - name: sessionId
          in: path
          description: ID of session to delete
          required: true
          schema:
            type: integer
            format: uint32
      responses:
        '200':
          description: session entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
        '401':
          description: Unauthorized
  '/session/{sessionId}/input':
    get:
      tags:
        - developers
      summary: retrieves input data
      operationId: getInput
      parameters:
        - name: sessionId
          in: path
          schema:
            type: string
          required: true
        - in: query
          schema:
            type: string
            format: date-time
            example: '2016-08-29T09:12:33.001Z'
          description: the timestamp of when input data was last cached
          name: cache
      responses:
        '200':
          description: input entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InputRowData'
    post:
      tags:
        - developers
      summary: adds a input entry
      operationId: addInput
      description: Adds a new input to the system
      parameters:
        - name: sessionId
          in: path
          schema:
            type: string
          required: true
      responses:
        '201':
          description: input entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                times_buttons_clicked:
                  type: integer
                distance_moved:
                  type: integer
                etc:
                  type: integer
        description: input data to add
    parameters:
      - schema:
          type: string
        name: sessionId
        in: path
        required: true
    put:
      summary: updates input entry
      tags:
        - developers
      operationId: updateInput
      description: Updates an existing input in the system
      requestBody:
        description: input data to update
        content:
          application/json:
            schema:
              type: object
              properties:
                times_buttons_clicked:
                  type: integer
                  format: uint32
                distance_moved:
                  type: integer
                  format: uint32
                etc:
                  type: integer
                  format: uint32
      responses:
        '200':
          description: input entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
    delete:
      tags:
        - admins
      summary: deletes a input entry
      operationId: deleteInput
      description: Deletes an existing input in the system
      parameters:
        - name: sessionId
          in: path
          description: ID of session input to delete
          required: true
          schema:
            type: integer
            format: uint32
      responses:
        '200':
          description: input entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
        '401':
          description: Unauthorized
  '/session/{sessionId}/time':
    get:
      tags:
        - developers
      summary: retrieves time data
      operationId: getTime
      parameters:
        - name: sessionId
          in: path
          schema:
            type: string
          required: true
        - in: query
          schema:
            type: string
            format: date-time
            example: '2016-08-29T09:12:33.001Z'
          description: the timestamp of when time data was last cached
          name: cache
      responses:
        '200':
          description: time entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeRowData'
    post:
      tags:
        - developers
      summary: adds a time entry
      operationId: addTime
      description: Adds a new time to the system
      parameters:
        - name: sessionId
          in: path
          schema:
            type: string
          required: true
      responses:
        '201':
          description: time entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                in_menus:
                  type: number
                in_exploration:
                  type: number
                in_dialogue:
                  type: number
        description: time data to add
    parameters:
      - schema:
          type: string
        name: sessionId
        in: path
        required: true
    put:
      summary: updates time entry
      tags:
        - developers
      operationId: updateTime
      description: Updates an existing time in the system
      requestBody:
        description: time data to update
        content:
          application/json:
            schema:
              type: object
              properties:
                in_menus:
                  type: number
                in_exploration:
                  type: number
                in_dialogue:
                  type: number
      responses:
        '200':
          description: time entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
    delete:
      tags:
        - admins
      summary: deletes a time entry
      operationId: deleteTime
      description: Deletes an existing time in the system
      parameters:
        - name: sessionId
          in: path
          description: ID of session time to delete
          required: true
          schema:
            type: integer
            format: uint32
      responses:
        '200':
          description: time entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ResponseInfo'
                  insert_id:
                    type: integer
                    format: uint32
        '400':
          description: 'invalid input, object invalid'
        '401':
          description: Unauthorized
components:
  schemas:
    SessionRowData:
      type: object
      required:
        - id
        - started_at
        - ended_at
        - recorded_at
      properties:
        id:
          type: integer
          format: uint32
          example: 7
        started_at:
          type: string
          format: date-time
          example: '2016-08-29T09:12:33.001Z'
        ended_at:
          type: string
          format: date-time
          example: '2016-08-29T09:12:33.001Z'
        recorded_at:
          type: string
          format: date-time
          example: '2016-08-29T09:12:33.001Z'
    InputRowData:
      type: object
      required:
        - session_id
        - times_buttons_clicked
        - distance_moved
        - etc
      properties:
        session_id:
          type: integer
          format: uint32
          example: 7
        times_buttons_clicked:
          type: integer
          format: int32
          example: 21
        distance_moved:
          type: integer
          format: int32
          example: 49
        etc:
          type: integer
          format: int32
          example: 0
    TimeRowData:
      type: object
      required:
        - session_id
        - in_menus
        - in_exploration
        - in_dialogue
      properties:
        session_id:
          type: integer
          format: uint32
          example: 7
        in_menus:
          type: number
        in_exploration:
          type: number
        in_dialogue:
          type: number
    ResponseInfo:
      type: object
      required:
        - ok
        - cacheable
        - context
        - error
      properties:
        ok:
          type: boolean
          example: true
        cacheable:
          type: boolean
          example: true
        context:
          type: object
        error:
          type: string
